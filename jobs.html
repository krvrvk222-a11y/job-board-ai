<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Jobs | JobBoard AI</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">
            <h1>JobBoard AI</h1>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Jobs</a></li>
            <li><a href="bookmarks.html">Bookmarks</a></li>
            <li><a href="about.html">About</a></li>
        </ul>

        <div class="nav-actions">
            <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
            <button class="post-job-btn">Post a Job</button>
        </div>
    </nav>
</header>

<main>

<section id="jobs-page">

    <div class="container">

        <h1>Browse Jobs</h1>

        <div class="jobs-search">

            <input
                type="text"
                id="jobs-search"
                placeholder="Search jobs, companies, or skills..."
            >

        </div>

        <div class="jobs-layout">

            <aside class="filter-sidebar">

                <h2>Filters</h2>

                <select id="filter-location">
                    <option value="">All Locations</option>
                    <option>Hyderabad</option>
                    <option>Bengaluru</option>
                    <option>Pune</option>
                    <option>Chennai</option>
                    <option>Mumbai</option>
                    <option>Remote</option>
                </select>

                <select id="filter-job-type">
                    <option value="">Job Type</option>
                    <option>Full Time</option>
                    <option>Part Time</option>
                    <option>Internship</option>
                    <option>Remote</option>
                    <option>Hybrid</option>
                </select>

                <select id="filter-experience">
                    <option value="">Experience</option>
                    <option>0-1 Year</option>
                    <option>0-2 Years</option>
                    <option>1-3 Years</option>
                    <option>2-4 Years</option>
                    <option>2-5 Years</option>
                </select>

                <select id="filter-salary">
                    <option value="">Salary</option>
                    <option>Below ₹10 LPA</option>
                    <option>₹10-15 LPA</option>
                    <option>Above ₹15 LPA</option>
                </select>

                <select id="sort-jobs">
                    <option value="">Sort By</option>
                    <option value="newest">Newest</option>
                    <option value="salary-high">Highest Salary</option>
                    <option value="salary-low">Lowest Salary</option>
                    <option value="company">Company Name</option>
                    <option value="experience">Experience</option>
                </select>

            </aside>

            <section class="jobs-content">

                <div id="all-jobs"></div>

                <div id="pagination"></div>

            </section>

        </div>

    </div>

</section>

</main>

<footer>

    <div class="container">

        <div class="footer-logo">
            <h2>JobBoard AI</h2>
            <p>Your gateway to better career opportunities.</p>
        </div>

        <div class="footer-links">

            <div>

                <h3>Quick Links</h3>

                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="jobs.html">Jobs</a></li>
                    <li><a href="bookmarks.html">Bookmarks</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>

            </div>

            <div>

                <h3>Contact</h3>

                <p>Email: support@jobboardai.com</p>
                <p>Phone: +91 98765 43210</p>

            </div>

        </div>

        <hr>

        <p>&copy; 2026 JobBoard AI. All Rights Reserved.</p>

    </div>

</footer>

<script src="js/data.js"></script>
<script src="js/jobs.js"></script>
<script src="js/search.js"></script>
<script src="js/bookmarks.js"></script>
<script src="js/app.js"></script>

<div id="toast" class="toast"></div>

</body>
</html>
